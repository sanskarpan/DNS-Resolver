apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dns-resolver-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dns-resolver
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: dns_queries_per_second
        target:
          type: AverageValue
          averageValue: "5000"
